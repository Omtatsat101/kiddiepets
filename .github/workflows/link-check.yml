name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            --exclude-mail
            --glob
            "./**/*.html"
            "./**/*.md"
            "./**/*.xml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
